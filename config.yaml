gateway:
  port: 8080
  access_keys: []
  key_cooldown_seconds: 1800
  session_ttl_seconds: 1800
  max_failover_retries: 3
  upstream_timeout_seconds: 120
services:
- name: context7
  upstream_url: https://mcp.context7.com/mcp
  enabled: true
  key_auth:
    enabled: true
    type: header
    param: CONTEXT7_API_KEY
  keys: []
  failure_patterns:
  - rate limit
  - quota
  - unauthorized
  - invalid api key
- name: tavily
  upstream_url: https://mcp.tavily.com/mcp/
  enabled: true
  key_auth:
    enabled: true
    type: query
    param: tavilyApiKey
  keys: []
  failure_patterns:
  - exceeds your plan
  - usage limit
  - upgrade your plan
  - unauthorized
