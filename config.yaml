# MCP 聚合网关配置文件
# 该文件由 GUI 编辑器（gui.pyw）管理，也可手动编辑。
# 注意：包含真实密钥，已在 .gitignore 中忽略，请勿提交。

gateway:
  # 网关监听端口
  port: 8080
  # 访问网关的统一密钥（支持多个，便于轮换/分发/吊销）
  # 客户端通过 Authorization: Bearer <key> 或 ?key=<key> 携带
  access_keys: []
  # 单把上游密钥失效后的冷却时间（秒），冷却期内不再选用，到期自动恢复
  key_cooldown_seconds: 1800
  # 会话映射的空闲淘汰时间（秒），仅对有状态上游（如 Context7）生效
  session_ttl_seconds: 1800
  # 单次请求允许的最大故障转移重试次数（即最多尝试多少把不同密钥）
  max_failover_retries: 3
  # 转发上游的超时时间（秒）
  upstream_timeout_seconds: 120

# 聚合的 MCP 服务列表。新增服务只需在此追加一项。
services:
  - name: context7
    # 是否启用该服务（关闭后对应路由返回 404）
    enabled: true
    # 上游 MCP 的 remote URL（Streamable HTTP 端点）
    upstream_url: "https://mcp.context7.com/mcp"
    # 密钥服务：勾选 enabled 即走密钥池轮询 + 故障转移逻辑
    key_auth:
      enabled: true
      # 密钥注入方式：header（请求头）或 query（查询参数）
      type: header
      # 注入的字段名
      param: "CONTEXT7_API_KEY"
    # 上游密钥池（多账户多密钥，自动轮询负载均衡）
    keys: []
    # 服务专属失败特征：命中以下任意关键词即判定当前密钥失效并触发故障转移
    # （大小写不敏感，匹配整个上游响应正文）
    failure_patterns:
      - "rate limit"
      - "quota"
      - "unauthorized"
      - "invalid api key"

  - name: tavily
    enabled: true
    upstream_url: "https://mcp.tavily.com/mcp/"
    key_auth:
      enabled: true
      type: query
      param: "tavilyApiKey"
    keys: []
    # Tavily 额度耗尽时 HTTP 仍为 200，错误埋在 result.content 文本里，
    # 因此必须靠以下特征识别（实测响应包含 status 432 与该提示语）
    failure_patterns:
      - "exceeds your plan"
      - "usage limit"
      - "upgrade your plan"
      - "unauthorized"
